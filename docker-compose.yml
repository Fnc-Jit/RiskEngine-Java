version: '3.8'

services:
  # --- Kafka (KRaft mode — official Apache image, no Zookeeper) ---
  kafka:
    image: apache/kafka:latest
    container_name: riskengine-kafka
    ports:
      - "9092:9092"
      - "9094:9094"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_LISTENERS: PLAINTEXT://:9092,CONTROLLER://:9093,EXTERNAL://:9094
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092,EXTERNAL://localhost:9094
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT,EXTERNAL:PLAINTEXT
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
      KAFKA_NUM_PARTITIONS: 3
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      CLUSTER_ID: risk-engine-cluster-001
    volumes:
      - kafka_data:/var/lib/kafka/data
    healthcheck:
      test: ["CMD-SHELL", "/opt/kafka/bin/kafka-topics.sh --bootstrap-server localhost:9092 --list || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 15
      start_period: 30s

  # --- TimescaleDB ---
  timescaledb:
    image: timescale/timescaledb:latest-pg16
    container_name: riskengine-timescaledb
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: riskengine
      POSTGRES_USER: riskengine
      POSTGRES_PASSWORD: riskengine
    volumes:
      - timescale_data:/var/lib/postgresql/data
      - ./src/main/resources/db/init.sql:/docker-entrypoint-initdb.d/01-init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U riskengine -d riskengine"]
      interval: 5s
      timeout: 3s
      retries: 10

  # --- RiskEngine Application ---
  riskengine:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: riskengine-app
    ports:
      - "8080:8080"
    environment:
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      DB_HOST: timescaledb
      DB_PORT: 5432
      DB_NAME: riskengine
      DB_USER: riskengine
      DB_PASSWORD: riskengine
      ONNX_MODEL_PATH: /app/model/risk_model.onnx
    depends_on:
      kafka:
        condition: service_healthy
      timescaledb:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8080/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 60s

  # --- ScenarioForge Event Generator ---
  event-generator:
    build:
      context: ./scenarioforge
      dockerfile: Dockerfile
    container_name: riskengine-generator
    command: ["--template", "mixed_demo", "--brokers", "kafka:9092"]
    depends_on:
      kafka:
        condition: service_healthy
    restart: unless-stopped

volumes:
  kafka_data:
  timescale_data:
