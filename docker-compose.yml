version: '3.8'

services:
  # --- Kafka (KRaft mode — no Zookeeper needed) ---
  kafka:
    image: bitnami/kafka:3.7
    container_name: riskengine-kafka
    ports:
      - "9092:9092"
      - "9094:9094"
    environment:
      # KRaft mode
      KAFKA_CFG_NODE_ID: 1
      KAFKA_CFG_PROCESS_ROLES: broker,controller
      KAFKA_CFG_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_CFG_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_CFG_LISTENERS: PLAINTEXT://:9092,CONTROLLER://:9093,EXTERNAL://:9094
      KAFKA_CFG_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092,EXTERNAL://localhost:9094
      KAFKA_CFG_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT,EXTERNAL:PLAINTEXT
      KAFKA_CFG_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_CFG_AUTO_CREATE_TOPICS_ENABLE: "true"
      KAFKA_CFG_NUM_PARTITIONS: 3
      KAFKA_KRAFT_CLUSTER_ID: risk-engine-cluster-001
    volumes:
      - kafka_data:/bitnami/kafka
    healthcheck:
      test: ["CMD-SHELL", "kafka-topics.sh --bootstrap-server localhost:9092 --list || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  # --- TimescaleDB ---
  timescaledb:
    image: timescale/timescaledb:latest-pg16
    container_name: riskengine-timescaledb
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: riskengine
      POSTGRES_USER: riskengine
      POSTGRES_PASSWORD: riskengine
    volumes:
      - timescale_data:/var/lib/postgresql/data
      - ./src/main/resources/db/init.sql:/docker-entrypoint-initdb.d/01-init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U riskengine -d riskengine"]
      interval: 5s
      timeout: 3s
      retries: 10

  # --- RiskEngine Application ---
  riskengine:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: riskengine-app
    ports:
      - "8080:8080"
    environment:
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      DB_HOST: timescaledb
      DB_PORT: 5432
      DB_NAME: riskengine
      DB_USER: riskengine
      DB_PASSWORD: riskengine
      ONNX_MODEL_PATH: /app/model/risk_model.onnx
    depends_on:
      kafka:
        condition: service_healthy
      timescaledb:
        condition: service_healthy
    restart: unless-stopped

  # --- Event Generator ---
  event-generator:
    build:
      context: ./scripts
      dockerfile: Dockerfile.generator
    container_name: riskengine-generator
    environment:
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      KAFKA_TOPIC: market-events
      EVENTS_PER_SECOND: 100
      SEED: 42
    depends_on:
      kafka:
        condition: service_healthy
    restart: unless-stopped

volumes:
  kafka_data:
  timescale_data:
